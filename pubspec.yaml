name: vaxtrack_ph
description: Vaccine verification and tracking system for the Philippines.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  mobile_scanner: ^5.0.0
  qr_flutter: ^4.1.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  image_picker: ^1.1.0
  gal: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true